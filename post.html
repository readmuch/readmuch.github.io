<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Post - Readmuch's Blog</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="styles/category.css">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header>
        <div class="brand-block">
            <a href="index.html" class="brand-title">Readmuch Home</a>
        </div>
        <nav class="tab-nav" aria-label="Categories" id="siteNav">
            <a class="tab" href="index.html">All Posts</a>
        </nav>
    </header>

    <main class="container article-container" role="main">
        <article id="postArticle">
            <header>
                <h1 id="postTitle">Loading...</h1>
                <div id="postMeta" class="post-meta"></div>
            </header>
            <section id="postContent"></section>
        </article>
    </main>

    <footer>
        <p>&copy; 2024 Readmuch's Blog. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script src="js/generated-data.js"></script>
    <script src="js/config.js"></script>
    <script>
    (async function() {
        function decodeMarkdownBuffer(buffer) {
            const utf8Text = new TextDecoder('utf-8', { fatal: false }).decode(buffer);
            const replacementCount = (utf8Text.match(/\uFFFD/g) || []).length;
            if (replacementCount > 0) {
                try {
                    return new TextDecoder('euc-kr', { fatal: false }).decode(buffer);
                } catch (error) {
                    return utf8Text;
                }
            }
            return utf8Text;
        }

        function parseFrontMatter(text) {
            if (typeof text !== 'string') {
                return { attributes: {}, body: '' };
            }

            const match = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?/);
            if (!match) {
                return { attributes: {}, body: text };
            }

            const attributes = {};
            match[1].split(/\r?\n/).forEach(line => {
                const metaMatch = line.match(/^([A-Za-z0-9_-]+):\s*(.*)$/);
                if (!metaMatch) return;

                const [, key, rawValue] = metaMatch;
                const value = rawValue.trim().replace(/^"(.*)"$/, '$1').replace(/^'(.*)'$/, '$1');
                attributes[key] = value;
            });

            return {
                attributes,
                body: text.slice(match[0].length)
            };
        }

        let cfg = null;
        try {
            cfg = new SiteConfig();
            await cfg.load();
            const nav = document.getElementById('siteNav');
            cfg.get().categories.forEach(cat => {
                const a = document.createElement('a');
                a.className = 'tab';
                a.href = cat.file;
                a.textContent = cat.title;
                nav.appendChild(a);
            });
        } catch (e) {
            console.error('Failed to load site config for nav', e);
        }

        const params = new URLSearchParams(location.search);
        const src = params.get('src');
        if (!src) {
            document.getElementById('postTitle').textContent = 'Post not found';
            document.getElementById('postContent').textContent = 'No source specified.';
            return;
        }

        const articleHeader = document.querySelector('#postArticle > header');
        const backLink = document.createElement('a');
        backLink.id = 'backLink';
        backLink.className = 'back-link';
        backLink.style.display = 'inline-block';
        backLink.style.marginBottom = '12px';
        backLink.href = 'index.html';
        backLink.textContent = 'Back';
        if (articleHeader) articleHeader.insertBefore(backLink, articleHeader.firstChild);

        try {
            let md = window.__POST_MARKDOWN__?.[src] || '';
            if (!md) {
                const res = await fetch(src);
                if (!res.ok) throw new Error('Not found');
                md = decodeMarkdownBuffer(await res.arrayBuffer());
            }
            const { attributes, body } = parseFrontMatter(md);
            const title = (attributes.title || '').trim();
            document.getElementById('postTitle').textContent = title || 'Untitled';

            const html = marked.parse(body);
            const safeHtml = DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
            document.getElementById('postContent').innerHTML = safeHtml;
            document.querySelectorAll('#postContent a').forEach(link => {
                link.setAttribute('rel', 'noopener noreferrer');
                if (!link.getAttribute('target')) {
                    link.setAttribute('target', '_self');
                }
            });

            if (attributes.date) {
                document.getElementById('postMeta').textContent = attributes.date;
            }

            if (cfg && cfg.get && src.includes('/')) {
                const dir = src.split('/')[0] || '';
                const catId = dir.toLowerCase();
                const category = cfg.get().categories.find(c => c.id === catId || c.title.toLowerCase() === catId);
                if (category) {
                    backLink.href = category.file || 'index.html';
                    backLink.textContent = `Back to ${category.title}`;
                }
            }

        } catch (err) {
            document.getElementById('postTitle').textContent = 'Failed to load post';
            document.getElementById('postContent').textContent = '' + err;
            console.error(err);
        }
    })();
    </script>
</body>
</html>
