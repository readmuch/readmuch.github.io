<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ SITE_DESCRIPTION }}">
    <meta name="theme-color" content="#f5f1ea">
    <meta name="color-scheme" content="light">
    <title>Post - {{ SITE_NAME }}</title>
    <link rel="icon" type="image/svg+xml" href="images/games.svg">
    <link rel="stylesheet" href="styles/category.css?v={{ ASSET_VERSION }}">
    <link rel="stylesheet" href="styles/main.css?v={{ ASSET_VERSION }}">
</head>
<body class="post-page">
    <header class="site-header">
        <div class="brand-block">
            <a href="index.html" class="brand-title">{{ SITE_SHORT_NAME }}</a>
            <span class="brand-subtitle">{{ SITE_DESCRIPTION }}</span>
        </div>
        <nav class="tab-nav" aria-label="Categories" id="siteNav">
            {{ NAV }}
        </nav>
    </header>

    <main class="container article-container" role="main">
        <article id="postArticle" class="post-article">
            <header class="post-article__header">
                <div id="postCategory" class="post-article__category">Article</div>
                <h1 id="postTitle">Loading...</h1>
                <div id="postMeta" class="post-meta"></div>
            </header>
            <section id="postContent" class="post-content" aria-live="polite">
                <div class="post-state">Loading article...</div>
            </section>
        </article>
    </main>

    <footer>
        <p>&copy; {{ SITE_YEAR }} {{ SITE_NAME }}. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script src="js/generated-data.js?v={{ ASSET_VERSION }}"></script>
    <script src="js/config.js?v={{ ASSET_VERSION }}"></script>
    <script>
    (async function() {
        function decodeMarkdownBuffer(buffer) {
            const utf8Text = new TextDecoder('utf-8', { fatal: false }).decode(buffer);
            const replacementCount = (utf8Text.match(/\uFFFD/g) || []).length;
            if (replacementCount > 0) {
                try {
                    return new TextDecoder('euc-kr', { fatal: false }).decode(buffer);
                } catch (error) {
                    return utf8Text;
                }
            }
            return utf8Text;
        }

        function parseFrontMatter(text) {
            if (typeof text !== 'string') {
                return { attributes: {}, body: '' };
            }

            const match = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?/);
            if (!match) {
                return { attributes: {}, body: text };
            }

            const attributes = {};
            match[1].split(/\r?\n/).forEach(line => {
                const metaMatch = line.match(/^([A-Za-z0-9_-]+):\s*(.*)$/);
                if (!metaMatch) return;

                const [, key, rawValue] = metaMatch;
                const value = rawValue.trim().replace(/^"(.*)"$/, '$1').replace(/^'(.*)'$/, '$1');
                attributes[key] = value;
            });

            return {
                attributes,
                body: text.slice(match[0].length)
            };
        }

        function showMissingPost(message) {
            document.getElementById('postTitle').textContent = 'Post not found';
            document.getElementById('postCategory').textContent = 'Missing article';
            document.getElementById('postContent').innerHTML = '';
            const state = document.createElement('div');
            state.className = 'post-state post-state--error';
            state.textContent = message;
            document.getElementById('postContent').appendChild(state);
        }

        function loadPostDataScript(entry) {
            return new Promise((resolve, reject) => {
                if (!entry.post.dataFile) {
                    reject(new Error('No generated post data file is registered.'));
                    return;
                }

                const existing = window.__POST_DATA__?.[entry.post.source];
                if (existing?.markdown) {
                    resolve(existing.markdown);
                    return;
                }

                const script = document.createElement('script');
                script.src = entry.post.dataFile;
                script.onload = () => {
                    const loaded = window.__POST_DATA__?.[entry.post.source];
                    loaded?.markdown ? resolve(loaded.markdown) : reject(new Error('Generated post data was empty.'));
                };
                script.onerror = () => reject(new Error(`Failed to load generated post data: ${entry.post.dataFile}`));
                document.head.appendChild(script);
            });
        }

        async function loadMarkdown(entry, src) {
            try {
                const response = await fetch(src);
                if (!response.ok) throw new Error('Not found');
                return decodeMarkdownBuffer(await response.arrayBuffer());
            } catch (fetchError) {
                console.warn('Markdown fetch failed, falling back to generated post data.', fetchError);
                return loadPostDataScript(entry);
            }
        }

        let cfg = null;
        let sourceIndex = new Map();
        try {
            cfg = new SiteConfig();
            await cfg.load();
            const categories = cfg.get().categories || [];
            categories.forEach(category => {
                (category.posts || []).forEach(post => {
                    if (post.source) {
                        sourceIndex.set(post.source, { post, category });
                    }
                });
            });
        } catch (error) {
            console.error('Failed to load site config for post page', error);
        }

        const params = new URLSearchParams(location.search);
        const src = params.get('src') || '';
        const entry = sourceIndex.get(src);
        if (!entry) {
            showMissingPost('The requested post is not registered in the site index.');
            return;
        }

        const articleHeader = document.querySelector('#postArticle > header');
        const backLink = document.createElement('a');
        backLink.id = 'backLink';
        backLink.className = 'back-link';
        backLink.href = entry.category.file || 'index.html';
        backLink.textContent = `← Back to ${entry.category.title}`;
        if (articleHeader) articleHeader.insertBefore(backLink, articleHeader.firstChild);

        try {
            const markdown = await loadMarkdown(entry, src);
            const { attributes, body } = parseFrontMatter(markdown);
            const title = (attributes.title || entry.post.title || '').trim();
            document.getElementById('postTitle').textContent = title || 'Untitled';
            document.title = `${title || 'Post'} - {{ SITE_NAME }}`;
            document.getElementById('postCategory').textContent = entry.category.title || 'Article';

            const html = marked.parse(body);
            const safeHtml = DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
            document.getElementById('postContent').innerHTML = safeHtml;
            document.querySelectorAll('#postContent a').forEach(link => {
                link.setAttribute('rel', 'noopener noreferrer');
                if (!link.getAttribute('target')) {
                    link.setAttribute('target', '_self');
                }
            });

            const dateText = attributes.date || entry.post.date || '';
            document.getElementById('postMeta').textContent = dateText ? `Published ${dateText}` : '';
        } catch (error) {
            document.getElementById('postTitle').textContent = 'Failed to load post';
            document.getElementById('postCategory').textContent = 'Loading error';
            document.getElementById('postContent').innerHTML = '';
            const state = document.createElement('div');
            state.className = 'post-state post-state--error';
            state.textContent = String(error);
            document.getElementById('postContent').appendChild(state);
            console.error(error);
        }
    })();
    </script>
</body>
</html>
