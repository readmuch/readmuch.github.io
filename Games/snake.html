<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스네이크</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", "Apple SD Gothic Neo", sans-serif;
            background: #f7f3e8;
            color: #1d2b22;
            display: grid;
            place-items: center;
            padding: 20px;
        }
        .game {
            width: min(100%, 820px);
            display: grid;
            gap: 16px;
        }
        .top-link { color: #2f6f4f; font-weight: 800; text-decoration: none; }
        .panel {
            background: #fffaf0;
            border: 3px solid #1d2b22;
            border-radius: 8px;
            box-shadow: 0 10px 0 #1d2b22;
            padding: 18px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 16px;
            flex-wrap: wrap;
        }
        h1 { margin: 0; font-size: clamp(2rem, 6vw, 4rem); line-height: .95; }
        p { margin: 8px 0 0; color: #4e5d52; }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(90px, 1fr));
            gap: 10px;
        }
        .stat {
            border: 2px solid #1d2b22;
            border-radius: 8px;
            padding: 10px;
            background: #dff3e6;
            text-align: center;
        }
        .stat span { display: block; font-size: .78rem; font-weight: 800; color: #4e5d52; }
        .stat strong { font-size: 1.6rem; }
        canvas {
            width: 100%;
            max-width: 560px;
            aspect-ratio: 1;
            justify-self: center;
            background: #183323;
            border: 4px solid #1d2b22;
            border-radius: 8px;
            image-rendering: pixelated;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            border: 2px solid #1d2b22;
            border-radius: 8px;
            background: #f8d34f;
            color: #1d2b22;
            font-weight: 900;
            padding: 12px 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #1d2b22;
        }
        button:active { transform: translateY(3px); box-shadow: 0 1px 0 #1d2b22; }
        .pad {
            display: grid;
            grid-template-columns: repeat(3, 54px);
            gap: 8px;
            justify-content: center;
        }
        .pad button { width: 54px; height: 48px; padding: 0; }
        .pad .up { grid-column: 2; }
        .pad .left { grid-column: 1; }
        .pad .down { grid-column: 2; }
        .pad .right { grid-column: 3; }
        .message { min-height: 26px; text-align: center; font-weight: 900; }
    </style>
</head>
<body>
    <main class="game">
        <a class="top-link" href="../games.html">← Games로 돌아가기</a>
        <section class="panel">
            <header>
                <div>
                    <h1>스네이크</h1>
                    <p>방향키나 아래 버튼으로 움직이고, 먹이를 먹으며 점수를 올려요.</p>
                </div>
                <div class="stats">
                    <div class="stat"><span>점수</span><strong id="score">0</strong></div>
                    <div class="stat"><span>최고</span><strong id="best">0</strong></div>
                    <div class="stat"><span>속도</span><strong id="speed">1</strong></div>
                </div>
            </header>
        </section>
        <canvas id="board" width="480" height="480" aria-label="스네이크 게임판"></canvas>
        <div class="message" id="message">시작을 누르면 게임이 시작됩니다.</div>
        <div class="controls">
            <button id="startBtn" type="button">시작</button>
            <button id="pauseBtn" type="button">일시정지</button>
            <button id="resetBtn" type="button">처음부터</button>
        </div>
        <div class="pad" aria-label="이동 버튼">
            <button class="up" data-dir="up" type="button">↑</button>
            <button class="left" data-dir="left" type="button">←</button>
            <button class="down" data-dir="down" type="button">↓</button>
            <button class="right" data-dir="right" type="button">→</button>
        </div>
    </main>
    <script>
        const canvas = document.getElementById("board");
        const ctx = canvas.getContext("2d");
        const size = 20;
        const cells = canvas.width / size;
        const scoreEl = document.getElementById("score");
        const bestEl = document.getElementById("best");
        const speedEl = document.getElementById("speed");
        const messageEl = document.getElementById("message");
        let snake, food, dir, nextDir, score, best, timer, running, paused, speed;

        function init() {
            snake = [{ x: 8, y: 10 }, { x: 7, y: 10 }, { x: 6, y: 10 }];
            dir = { x: 1, y: 0 };
            nextDir = { x: 1, y: 0 };
            score = 0;
            speed = 1;
            running = false;
            paused = false;
            best = Number(localStorage.getItem("snake-best") || 0);
            placeFood();
            updateStats();
            draw();
            messageEl.textContent = "시작을 누르면 게임이 시작됩니다.";
        }

        function placeFood() {
            do {
                food = { x: Math.floor(Math.random() * cells), y: Math.floor(Math.random() * cells) };
            } while (snake.some(part => part.x === food.x && part.y === food.y));
        }

        function updateStats() {
            scoreEl.textContent = score;
            bestEl.textContent = best;
            speedEl.textContent = speed;
        }

        function start() {
            if (running && !paused) return;
            running = true;
            paused = false;
            messageEl.textContent = "좋아요. 먹이를 향해 움직여요!";
            clearInterval(timer);
            timer = setInterval(step, Math.max(70, 150 - speed * 10));
        }

        function pause() {
            if (!running) return;
            paused = !paused;
            messageEl.textContent = paused ? "잠시 쉬는 중입니다." : "다시 출발!";
        }

        function reset() {
            clearInterval(timer);
            init();
        }

        function setDir(name) {
            const dirs = {
                up: { x: 0, y: -1 },
                down: { x: 0, y: 1 },
                left: { x: -1, y: 0 },
                right: { x: 1, y: 0 }
            };
            const wanted = dirs[name];
            if (!wanted || wanted.x + dir.x === 0 && wanted.y + dir.y === 0) return;
            nextDir = wanted;
            start();
        }

        function step() {
            if (paused) return;
            dir = nextDir;
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
            const hitWall = head.x < 0 || head.y < 0 || head.x >= cells || head.y >= cells;
            const hitSelf = snake.some(part => part.x === head.x && part.y === head.y);
            if (hitWall || hitSelf) {
                gameOver();
                return;
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                speed = Math.min(10, 1 + Math.floor(score / 50));
                best = Math.max(best, score);
                localStorage.setItem("snake-best", String(best));
                placeFood();
                clearInterval(timer);
                timer = setInterval(step, Math.max(70, 150 - speed * 10));
            } else {
                snake.pop();
            }
            updateStats();
            draw();
        }

        function gameOver() {
            running = false;
            clearInterval(timer);
            messageEl.textContent = "게임 끝! 처음부터 다시 도전해 보세요.";
            draw();
        }

        function draw() {
            ctx.fillStyle = "#183323";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(255,255,255,.08)";
            for (let i = 0; i <= cells; i++) {
                ctx.beginPath();
                ctx.moveTo(i * size, 0);
                ctx.lineTo(i * size, canvas.height);
                ctx.moveTo(0, i * size);
                ctx.lineTo(canvas.width, i * size);
                ctx.stroke();
            }
            ctx.fillStyle = "#ff6b6b";
            roundCell(food.x, food.y, 7);
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#f8d34f" : "#75d989";
                roundCell(part.x, part.y, 5);
            });
        }

        function roundCell(x, y, radius) {
            const inset = 2;
            const left = x * size + inset;
            const top = y * size + inset;
            const width = size - inset * 2;
            ctx.beginPath();
            ctx.roundRect(left, top, width, width, radius);
            ctx.fill();
        }

        document.getElementById("startBtn").addEventListener("click", start);
        document.getElementById("pauseBtn").addEventListener("click", pause);
        document.getElementById("resetBtn").addEventListener("click", reset);
        document.querySelectorAll("[data-dir]").forEach(button => {
            button.addEventListener("click", () => setDir(button.dataset.dir));
        });
        document.addEventListener("keydown", event => {
            const map = { ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right" };
            if (event.code === "Space") pause();
            if (map[event.key]) {
                event.preventDefault();
                setDir(map[event.key]);
            }
        });
        init();
    </script>
</body>
</html>
