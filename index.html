<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Exploring the intersection of knowledge and creativity">
    <meta name="keywords" content="Book, Education, Technology, Life, Mindnotes, Games">
    <meta name="theme-color" content="#f5f1ea">
    <meta name="color-scheme" content="light">
    <meta property="og:title" content="Readmuch's Blog">
    <meta property="og:description" content="Exploring the intersection of knowledge and creativity">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://readmuch.github.io">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Readmuch's Blog">
    <meta name="twitter:description" content="Exploring the intersection of knowledge and creativity">
    <title>Readmuch's Blog</title>
    <link rel="icon" type="image/svg+xml" href="images/games.svg">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/category.css?v=934e69a3a4">
</head>
<body class="home-page">
    <header class="site-header">
        <div class="brand-block">
            <a href="index.html" class="brand-title">Readmuch</a>
            <span class="brand-subtitle">Exploring the intersection of knowledge and creativity</span>
        </div>
        <nav class="tab-nav" aria-label="Categories">
            <a class="tab active" href="index.html">All Posts</a>
            <a class="tab" href="book.html">Book</a>
            <a class="tab" href="education.html">Education</a>
            <a class="tab" href="life.html">Lifestyle</a>
            <a class="tab" href="tech.html">Technology</a>
            <a class="tab" href="mindnotes.html">Mind Notes</a>
            <a class="tab" href="games.html">Games</a>
        </nav>
        <div class="header-actions">
            <label for="postSearch" class="sr-only">Search posts</label>
            <input type="search" id="postSearch" class="search-input" placeholder="Search posts" aria-label="Search posts">
        </div>
    </header>

    <main class="container category-container home-shell" role="main">
        <section class="latest-section" aria-labelledby="latestPostsTitle">
            <div class="section-heading section-heading--inline">
                <div>
                    <span class="section-kicker">Recently added</span>
                    <h2 id="latestPostsTitle">All Posts</h2>
                </div>
                <p id="archiveCount">59 notes across 6 shelves</p>
            </div>
            <ul id="postList" role="list"></ul>
            <nav class="pagination" role="navigation" aria-label="Pagination"></nav>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Readmuch's Blog. All rights reserved.</p>
    </footer>
    <script src="js/generated-data.js?v=934e69a3a4"></script>
    <script src="js/config.js?v=934e69a3a4"></script>
    <script src="js/pagination.js?v=934e69a3a4"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const config = new SiteConfig();
                await config.load();
                const allCategories = config.get().categories || [];
                const flattened = allCategories.flatMap(cat =>
                    (cat.posts || []).map(post => ({
                        ...post,
                        badge: cat.title || cat.id || ''
                    }))
                );
                const sorted = flattened.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
                const pagination = new Pagination('postList', sorted, config.getPagination().postsPerPage, config.getPagination());

                const searchInput = document.getElementById('postSearch');
                if (searchInput) {
                    searchInput.addEventListener('input', event => pagination.setFilter(event.target.value));
                }
            } catch (error) {
                document.getElementById('postList').innerHTML = '<li>Error loading posts.</li>';
                console.error('Failed to initialize home page:', error);
            }
        });
    </script>
</body>
</html>
